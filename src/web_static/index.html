<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OneVoice Edge</title>
    <link rel="stylesheet" href="/style.css" />
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div class="brand">
          <button class="icon-button" id="menuBtn" aria-label="Menu">
            <span></span><span></span><span></span>
          </button>
          <div>
            <h1>OneVoice Edge</h1>
            <div class="live-title"><span class="dot"></span><span id="stateText">Loading models</span></div>
          </div>
        </div>

        <div class="toolbar">
          <button class="lang-pill" id="sourceLangBtn" aria-label="Source language">
            <span class="flag vi">★</span><span id="sourceLang">VI</span>
          </button>
          <button class="swap" id="swapBtn" aria-label="Swap languages">⇄</button>
          <button class="lang-pill" id="targetLangBtn" aria-label="Target language">
            <span class="flag us">US</span><span id="targetLang">EN</span>
          </button>
          <button class="speaker" id="speakBtn" aria-label="Speak latest translation">
            <span class="speaker-icon">)))</span><span>Silence</span>
          </button>
        </div>
      </header>

      <section class="workspace" aria-label="Live transcript">
        <article class="pane">
          <div class="pane-header">
            <span>Spoken speech</span>
            <small id="sourceHint">Vietnamese input</small>
          </div>
          <div class="stream" id="sourceStream" aria-live="polite"></div>
        </article>

        <article class="pane translated-pane">
          <div class="pane-header">
            <span>Translation</span>
            <small id="targetHint">English output</small>
          </div>
          <div class="stream" id="translatedStream" aria-live="polite"></div>
        </article>
      </section>

      <section class="bottom-console">
        <div class="composer" aria-label="Text translation">
          <textarea id="textInput" rows="2" placeholder="Type a sentence to translate"></textarea>
          <button id="sendTextBtn" aria-label="Translate text">Go</button>
        </div>

        <div class="record-stack">
          <button class="record" id="recordBtn" aria-label="Start live recording">
            <span id="recordIcon">Ⅱ</span>
          </button>
          <div class="latency" id="latencyLine"></div>
        </div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
