# OneVoice Edge runtime configuration.

audio:
  sample_rate: 16000
  chunk_size: 1024
  channels: 1
  format: int16
  vad_threshold: 0.5
  vad_min_speech_ms: 300
  vad_window_ms: 256
  vad_min_silence_ms: 280
  vad_pre_roll_ms: 160
  vad_speech_pad_ms: 80
  vad_max_segment_s: 8.0

denoise:
  enabled: true
  model_path: "models/gipformer_denoise.onnx"
  use_gpu: false

asr:
  num_threads: 2
  streaming: true
  chunk_length_s: 3

sensevoice:
  model_path: "iic/SenseVoiceSmall"

translation:
  model: "VietAI/envit5-translation"
  model_dir: "models/envit5/"
  backend: "auto"
  ct2_model_dir: "models/envit5-ct2-int8/"
  compute_type: "int8"
  inter_threads: 1
  intra_threads: 4
  beam_size: 1
  max_length: 512
  direction: "vi2en"

tts:
  default_engine: "betterbox"
  en_speed: 0.85
  en_preset_audio: "src/tts/presets/en_male_narrator.wav"
  en_preset_text: "Some call me nature, others call me mother nature."
  betterbox:
    model_path: "models/betterbox/"
    language: "vi"
    speed: 1.0
    pitch: 0
  vits:
    model_path: "models/vits_en_tiny.onnx"
    language: "en"
  vallex:
    enabled: false
    model_path: "models/vallex/"

pipeline:
  queue_maxsize: 10
  target_latency_ms: 1000
  log_latency: true
